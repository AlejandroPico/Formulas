name: Formula catalog

on:
  workflow_dispatch:
  push:
    paths:
      - "formulas/**"
      - "tools/build-formula-catalog.mjs"

permissions:
  contents: write

jobs:
  build-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build formula catalog
        run: node tools/build-formula-catalog.mjs

      - name: Commit catalog changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update formula catalog"
          file_pattern: formulas/catalog.json
