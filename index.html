<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas de Ecuaciones Famosas</title>
  <meta name="description" content="Biblioteca interactiva de ecuaciones famosas: Newton, Maxwell, Schrödinger, Einstein, Navier-Stokes, Boltzmann, Fourier, Euler, Dirac y Planck." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/responsive.css" />
  <link rel="stylesheet" href="styles/visual-refresh.css" />
  <link rel="stylesheet" href="styles/responsive-refresh.css" />
  <link rel="stylesheet" href="styles/no-header-label.css" />
  <link rel="stylesheet" href="styles/tool-controls.css" />
  <link rel="stylesheet" href="styles/card-refresh.css" />
  <link rel="stylesheet" href="styles/interaction-fixes.css" />
  <link rel="stylesheet" href="styles/pythagorean-simulation.css" />
  <script>
    window.MathJax = {
      options: { enableMenu: false },
      tex: { inlineMath: [['\\(', '\\)'], ['$', '$']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body data-theme="auto">
  <div class="orbital-bg" aria-hidden="true">
    <span></span><span></span><span></span>
  </div>

  <div class="floating-controls" aria-label="Controles flotantes">
    <button id="filterToggle" class="floating-button" type="button" aria-label="Abrir filtros" aria-expanded="false">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3.5 5.5h17l-6.7 7.7v4.9l-3.6 1.8v-6.7L3.5 5.5Z" /></svg>
    </button>
    <button id="themeToggle" class="theme-toggle" type="button" aria-label="Cambiar tema visual">◐ Auto</button>
  </div>

  <aside id="filterPanel" class="filter-popover" aria-label="Filtros del atlas" hidden>
    <label>
      <span>Orden</span>
      <select id="sortSelect" aria-label="Ordenar ecuaciones">
        <option value="chronology">Orden histórico</option>
        <option value="name">Nombre</option>
        <option value="field">Área científica</option>
        <option value="level">Nivel educativo</option>
      </select>
    </label>
    <label>
      <span>Área</span>
      <select id="fieldSelect" aria-label="Filtrar por área científica"></select>
    </label>
    <label>
      <span>Nivel</span>
      <select id="levelSelect" aria-label="Filtrar por nivel educativo"></select>
    </label>
  </aside>

  <main class="app-shell">
    <section class="equation-grid" id="equationGrid" aria-live="polite"></section>
  </main>

  <dialog class="equation-modal" id="equationModal">
    <button class="modal-close" id="modalClose" aria-label="Cerrar ficha">×</button>
    <div class="modal-content" id="modalContent"></div>
  </dialog>

  <template id="equationCardTemplate">
    <article class="equation-card" tabindex="0">
      <h3></h3>
      <div class="formula-box"></div>
    </article>
  </template>

  <script type="module" src="scripts/main.js"></script>
  <script type="module" src="scripts/modal-enhancements.js"></script>
</body>
</html>
