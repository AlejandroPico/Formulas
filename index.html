<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas de Ecuaciones Famosas</title>
  <meta name="description" content="Biblioteca interactiva de ecuaciones famosas: Newton, Maxwell, Schrödinger, Einstein, Navier-Stokes, Boltzmann, Fourier, Euler, Dirac y Planck." />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/responsive.css" />
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(', '\\)'], ['$', '$']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body data-theme="auto">
  <div class="orbital-bg" aria-hidden="true">
    <span></span><span></span><span></span>
  </div>

  <section class="splash-screen" id="splashScreen" aria-label="Pantalla de entrada">
    <div class="splash-copy">
      <p class="eyebrow">Atlas científico</p>
      <h1>Una constelación interactiva de fórmulas que cambiaron la ciencia.</h1>
      <p>Haz clic para entrar o espera unos segundos.</p>
    </div>
    <canvas id="heroCanvas" width="720" height="420" aria-hidden="true"></canvas>
  </section>

  <button id="themeToggle" class="theme-toggle" type="button" aria-label="Cambiar tema visual">◐ Auto</button>

  <main class="app-shell">
    <section class="section-toolbar compact-toolbar" aria-label="Controles de catálogo">
      <span class="catalog-mark">Atlas de Ecuaciones Famosas</span>
      <select id="sortSelect" aria-label="Ordenar ecuaciones">
        <option value="chronology">Orden histórico</option>
        <option value="name">Nombre</option>
        <option value="field">Área científica</option>
        <option value="level">Nivel educativo</option>
      </select>
    </section>

    <section class="equation-grid" id="equationGrid" aria-live="polite"></section>
  </main>

  <dialog class="equation-modal" id="equationModal">
    <button class="modal-close" id="modalClose" aria-label="Cerrar ficha">×</button>
    <div class="modal-content" id="modalContent"></div>
  </dialog>

  <template id="equationCardTemplate">
    <article class="equation-card">
      <div class="card-topline">
        <span class="field-tag"></span>
        <span class="year-tag"></span>
      </div>
      <h3></h3>
      <div class="formula-box"></div>
      <p class="card-summary"></p>
      <div class="card-footer">
        <button class="open-card">Abrir ficha</button>
      </div>
    </article>
  </template>

  <script type="module" src="scripts/main.js"></script>
</body>
</html>
