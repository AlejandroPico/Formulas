<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas de Ecuaciones Famosas</title>
  <meta name="description" content="Biblioteca interactiva de ecuaciones famosas: Newton, Maxwell, Schrödinger, Einstein, Navier-Stokes, Boltzmann, Fourier, Euler, Dirac y Planck." />

  <link rel="stylesheet" href="styles/responsive.css" />
  <link rel="stylesheet" href="styles/visual-refresh.css" />
  <link rel="stylesheet" href="styles/responsive-refresh.css" />
  <link rel="stylesheet" href="styles/no-header-label.css" />
  <link rel="stylesheet" href="styles/tool-controls.css" />
  <link rel="stylesheet" href="styles/card-refresh.css" />
  <link rel="stylesheet" href="styles/card-context-labels.css" />
  <link rel="stylesheet" href="styles/card-fit-guard.css" />
  <link rel="stylesheet" href="styles/performance.css" />
  <link rel="stylesheet" href="styles/thematic-modes.css" />
  <link rel="stylesheet" href="styles/thematic-extra-modes.css" />
  <link rel="stylesheet" href="styles/terminal-variants.css" />
  <link rel="stylesheet" href="styles/interaction-fixes.css" />
  <link rel="stylesheet" href="styles/pythagorean-simulation.css" />
  <link rel="stylesheet" href="styles/formula-popover-position.css" />
  <link rel="stylesheet" href="styles/formula-plugins.css" />
  <link rel="stylesheet" href="styles/simulation-layout-fixes.css" />
  <link rel="stylesheet" href="styles/catalog-tools.css" />
  <link rel="stylesheet" href="styles/loading.css" />
  <script>
    window.MathJax = {
      options: { enableMenu: false },
      tex: { inlineMath: [['\\(', '\\)'], ['$', '$']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body data-theme="auto">
  <div class="orbital-bg" aria-hidden="true">
    <span></span><span></span><span></span>
  </div>

  <div id="loadingOverlay" class="loading-overlay" role="status" aria-live="polite">
    <div class="loading-card">
      <div class="loading-orbit" aria-hidden="true"></div>
      <strong>Cargando datos</strong>
      <span id="loadingStatus">Preparando atlas</span>
      <div class="loading-progress" aria-hidden="true"><i id="loadingProgressBar"></i></div>
    </div>
  </div>

  <div class="floating-controls" aria-label="Controles flotantes">
    <div class="search-control" id="searchControl">
      <div class="search-field" id="searchField" hidden>
        <input id="searchInput" type="search" autocomplete="off" spellcheck="false" placeholder="Buscar por fórmula, autor, uso, símbolo…" aria-label="Buscar ecuaciones" />
        <button id="searchClear" class="search-clear" type="button" aria-label="Limpiar búsqueda">×</button>
      </div>
      <button id="searchToggle" class="floating-button" type="button" aria-label="Abrir búsqueda" aria-expanded="false">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="10.8" cy="10.8" r="6.4" /><path d="m16 16 4.2 4.2" /></svg>
      </button>
    </div>
    <button id="filterToggle" class="floating-button" type="button" aria-label="Abrir filtros" aria-expanded="false">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3.5 5.5h17l-6.7 7.7v4.9l-3.6 1.8v-6.7L3.5 5.5Z" /></svg>
    </button>
    <button id="themeToggle" class="theme-toggle" type="button" aria-label="Cambiar tema visual">◐ Auto</button>
  </div>

  <aside id="filterPanel" class="filter-popover" aria-label="Filtros del atlas" hidden>
    <div class="filter-summary" aria-live="polite">
      <span>Fórmulas visibles</span>
      <strong id="visibleCount">0 / 0</strong>
    </div>
    <label>
      <span>Visualización</span>
      <select id="formulaDisplaySelect" aria-label="Modo de visualización de fórmulas">
        <option value="symbolic" selected>Fórmula simbólica</option>
        <option value="explained">Fórmula explicada</option>
      </select>
    </label>
    <label>
      <span>Orden</span>
      <select id="sortSelect" aria-label="Ordenar ecuaciones">
        <option value="default" selected>Orden</option>
        <option value="chronology">Orden histórico</option>
        <option value="name">Nombre</option>
        <option value="field">Área científica</option>
        <option value="level">Nivel educativo</option>
      </select>
    </label>
    <label>
      <span>Área</span>
      <select id="fieldSelect" aria-label="Filtrar por área científica"></select>
    </label>
    <label>
      <span>Nivel</span>
      <select id="levelSelect" aria-label="Filtrar por nivel educativo"></select>
    </label>
  </aside>

  <main class="app-shell">
    <section class="equation-grid" id="equationGrid" aria-live="polite"></section>
  </main>

  <dialog class="equation-modal" id="equationModal">
    <button class="modal-close" id="modalClose" aria-label="Cerrar ficha">×</button>
    <div class="modal-content" id="modalContent"></div>
  </dialog>

  <template id="equationCardTemplate">
    <article class="equation-card" tabindex="0">
      <h3></h3>
      <div class="formula-box"></div>
    </article>
  </template>

  <script type="module" src="scripts/main.js"></script>
  <script type="module" src="scripts/catalog-tools.js"></script>
  <script type="module" src="scripts/introduced-order-tools.js"></script>
  <script type="module" src="scripts/latest-formula-batch.js"></script>
  <script type="module" src="scripts/latest-formula-batch-2.js"></script>
  <script type="module" src="scripts/latest-formula-batch-3.js"></script>

  <script type="module" src="scripts/card-fit-guard.js"></script>
  <script type="module" src="scripts/thematic-card-variants.js"></script>
  <script type="module" src="scripts/modal-enhancements.js"></script>
  <script type="module" src="scripts/formula-tooltip-boot.js"></script>
  <script type="module" src="scripts/formula-explained-polish.js"></script>
  <script type="module" src="scripts/formula-symbolic-mathjax-fix.js"></script>
</body>
</html>
